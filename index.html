<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christine Pamela</title>
    <link rel="icon" type="image/png" href="underdog.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            line-height: 1.6;
background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Main ── */
        main {
            flex: 1;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
        }

        .duo {
            display: flex;
            gap: 8rem;
            align-items: center;
            justify-content: center;
        }

        /* ── Grid items ── */
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: #333;
            transition: opacity 0.3s ease, transform 0.35s ease;
        }

        .grid-item:hover {
            opacity: 0.55;
            transform: translateY(-4px);
        }

        .grid-item img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            transition: transform 0.35s ease;
        }

        .grid-item:hover img {
            transform: scale(1.06);
        }

        .grid-item-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-align: center;
            color: #333;
        }

        /* Editorial rules — asymmetric per item */
        .grid-item-line {
            height: 0.5px;
            background-color: #2E2E2E;
            margin-top: 0.1rem;
        }

        /* Innovations: bleeds left before I, ends exactly at s (= full label width) */
        .line-innovations {
            width: calc(100% + 1.8rem);
            margin-left: -1.8rem;
        }

        /* Consultation: starts at C, bleeds right past n */
        .line-consultation {
            width: calc(100% + 1.8rem);
            margin-left: 0.9rem;
        }

        /* ── Footer ── */
        .footer {
            padding: 2.5rem 2rem;
            background-color: #F2F1EF;
        }

        .footer-content {
            max-width: 700px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            text-align: center;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.6rem;
        }

        .footer-section a {
            font-size: 0.82rem;
            color: #888;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.25s ease, border-bottom-color 0.25s ease;
            padding-bottom: 1px;
            border-bottom: 1px solid transparent;
        }

        .footer-section a:hover {
            color: #333;
            border-bottom-color: #333;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .duo {
                gap: 3.5rem;
            }

            .grid-item img {
                width: 60px;
                height: 60px;
            }

            .grid-item-label {
                font-size: 1.3rem;
            }

            .footer-content {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="duo">
            <a href="startups.html" class="grid-item">
                <img src="icon_startup.png" alt="Innovations">
                <div class="grid-item-label">Innovations</div>
                <div class="grid-item-line line-innovations"></div>
            </a>

            <a href="consultation.html" class="grid-item">
                <img src="icon_consultation.png" alt="Consultation">
                <div class="grid-item-label">Consultation</div>
                <div class="grid-item-line line-consultation"></div>
            </a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">

            <div class="footer-section">
                <ul>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="writing.html">Writing</a></li>
                    <li><a href="phd.html">PhD</a></li>
                </ul>
            </div>

            <div class="footer-section">
                <ul>
                    <li><a href="tools.html">Tools</a></li>
                    <li><a href="startups.html">Innovations</a></li>
                    <li><a href="consultation.html">Consultation</a></li>
                </ul>
            </div>

            <div class="footer-section">
                <ul>
                    <li><a href="https://x.com/christinepamela" target="_blank" rel="noopener">Twitter</a></li>
                    <li><a href="https://www.linkedin.com/in/christinepamela/" target="_blank" rel="noopener">LinkedIn</a></li>
                    <li><a href="https://christinepamela.com/contact">Contact</a></li>
                </ul>
            </div>

        </div>
    </footer>

</body>
</html>
