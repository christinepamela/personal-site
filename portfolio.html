<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Christine Pamela</title>
    <link rel="icon" type="image/png" href="underdog.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #FAFAFA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            padding: 2rem 0;
            text-align: center;
            border-bottom: 1px solid #E5E5E5;
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #333;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .brand:hover {
            opacity: 0.7;
        }

        /* ── Page heading ── */
        .page-heading {
            text-align: center;
            padding: 3.5rem 2rem 2rem;
        }

        .page-heading h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #999;
        }

        /* ── Grid ── */
        .grid {
            max-width: 860px;
            margin: 0 auto;
            padding: 1rem 2rem 5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            flex: 1;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
            background-color: #FFF;
            border: 1px solid #E9E9E9;
            border-radius: 2px;
            padding: 2.5rem 1.5rem;
            transition: transform 0.35s ease, box-shadow 0.35s ease, background-color 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #333;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.07);
            background-color: #FEFEFE;
        }

        .card:hover::after {
            transform: scaleX(1);
        }

        /* Individual card tints — matching the homepage palette */
        .card:nth-child(1) { background-color: #F5F4F2; }
        .card:nth-child(2) { background-color: #FFFFFF; }
        .card:nth-child(3) { background-color: #EDE9E3; }
        .card:nth-child(4) { background-color: #F8F7F5; }
        .card:nth-child(5) { background-color: #EEF0EC; }
        .card:nth-child(6) { background-color: #F4F2EF; }

        .card-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            font-style: italic;
            color: #BBB;
            margin-bottom: 1.1rem;
            letter-spacing: 1px;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #333;
            text-align: center;
        }

        .card-arrow {
            margin-top: 1.1rem;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #BBB;
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .card:hover .card-arrow {
            color: #555;
            transform: translateX(4px);
        }

        /* ── Footer ── */
        .footer {
            margin-top: auto;
            padding: 2rem;
            border-top: 1px solid #E5E5E5;
            text-align: center;
        }

        .footer a {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #AAA;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #333;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 420px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .brand {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="https://christinepamela.com" class="brand">Pam's Corner</a>
    </header>

    <div class="page-heading">
        <h1>Portfolio</h1>
    </div>

    <main class="grid">

        <a href="https://christinepamela.com/gallery.html" class="card">
            <span class="card-number">01</span>
            <span class="card-title">Gallery</span>
            <span class="card-arrow">→</span>
        </a>

        <a href="https://christinepamela.com/PamCV.pdf" class="card" target="_blank" rel="noopener">
            <span class="card-number">02</span>
            <span class="card-title">CV</span>
            <span class="card-arrow">→</span>
        </a>

        <a href="https://christinepamela.com/social-impact.html" class="card">
            <span class="card-number">03</span>
            <span class="card-title">Social Impact</span>
            <span class="card-arrow">→</span>
        </a>

        <a href="https://christinepamela.com/media.html" class="card">
            <span class="card-number">04</span>
            <span class="card-title">Media</span>
            <span class="card-arrow">→</span>
        </a>

        <a href="https://christinepamela.com/events.html" class="card">
            <span class="card-number">05</span>
            <span class="card-title">Events</span>
            <span class="card-arrow">→</span>
        </a>

        <a href="https://christinepamela.com/awards.html" class="card">
            <span class="card-number">06</span>
            <span class="card-title">Awards</span>
            <span class="card-arrow">→</span>
        </a>

    </main>

    <footer class="footer">
        <a href="https://christinepamela.com">← Back to Home</a>
    </footer>

</body>
</html>
