<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation - Christine Pamela</title>
    <link rel="icon" type="image/png" href="underdog.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Page heading ── */
        .page-heading {
            text-align: center;
            padding: 3.5rem 2rem 2rem;
        }

        .page-heading h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #999;
        }

        /* ── Grid ── */
        .grid {
            max-width: 860px;
            margin: 0 auto;
            padding: 1rem 2rem 5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            flex: 1;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
            border: 1px solid #E9E9E9;
            border-radius: 2px;
            padding: 2.5rem 1.5rem;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #333;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.07);
        }

        .card:hover::after {
            transform: scaleX(1);
        }

        .card:nth-child(1) { background-color: #F5F4F2; }
        .card:nth-child(2) { background-color: #EDE9E3; }
        .card:nth-child(3) { background-color: #F8F7F5; }

        .card-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            font-style: italic;
            color: #BBB;
            margin-bottom: 1.1rem;
            letter-spacing: 1px;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #333;
            text-align: center;
        }

        .card-arrow {
            margin-top: 1.1rem;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #BBB;
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .card:hover .card-arrow {
            color: #555;
            transform: translateX(4px);
        }

        /* ── Back link ── */
        .back-link-wrap {
            text-align: center;
            padding: 0 2rem 2rem;
        }

        .back-link {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #AAA;
            text-decoration: none;
            transition: color 0.25s ease;
        }

        .back-link:hover {
            color: #333;
        }

        /* ── Footer ── */
        .footer {
            padding: 2.5rem 2rem;
            background-color: #F2F1EF;
        }

        .footer-content {
            max-width: 700px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            text-align: center;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.6rem;
        }

        .footer-section a {
            font-size: 0.82rem;
            color: #888;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.25s ease, border-bottom-color 0.25s ease;
            padding-bottom: 1px;
            border-bottom: 1px solid transparent;
        }

        .footer-section a:hover {
            color: #333;
            border-bottom-color: #333;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    </main>

    <div class="back-link-wrap">

        <div class="footer-content">

                    <li><a href="https://x.com/christinepamela" target="_blank" rel="noopener">Twitter</a></li>

</body>
